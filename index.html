<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#dc2626">
  <meta name="description" content="SkyNet - AI-powered productivity board with voice commands, Siri integration, and task analysis">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Can Do Board">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="msapplication-TileColor" content="#0f172a">
  <title>SkyNet - Can Do Board</title>

  <!-- PWA Manifest (external file) -->
  <link rel="manifest" href="manifest.json">

  <!-- Icons (generated PNGs) -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <!-- Preconnect to CDNs -->
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ============================================
       BASE STYLES - SkyNet Theme
       ============================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    /* Custom Scrollbar - SkyNet Red Theme */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #ef4444; }

    /* PWA Standalone Mode Adjustments */
    @media all and (display-mode: standalone) {
      body { padding-top: env(safe-area-inset-top); }
    }

    /* Loading Screen */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-eye {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle, #dc2626 0%, #991b1b 40%, transparent 70%);
      animation: pulse-eye 1.5s ease-in-out infinite;
      box-shadow: 0 0 40px #dc2626, 0 0 80px rgba(220, 38, 38, 0.3);
    }

    @keyframes pulse-eye {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .loading-text {
      margin-top: 24px;
      color: #dc2626;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* App Root */
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <!-- Loading Screen (shown while React/Babel loads) -->
  <div id="loading-screen">
    <div class="loading-eye"></div>
    <div class="loading-text">SkyNet Initializing...</div>
  </div>

  <!-- React Root -->
  <div id="root"></div>

  <!-- Service Worker Registration & PWA Install Handling -->
  <script>
    // Register external service worker for offline capability
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('sw.js')
          .then((registration) => {
            console.log('[SkyNet] Service Worker registered:', registration.scope);
            // Check for updates periodically
            setInterval(() => { registration.update(); }, 60 * 60 * 1000);
          })
          .catch((error) => {
            console.warn('[SkyNet] Service Worker registration failed:', error);
          });
      });
    }

    // Handle PWA install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      window.dispatchEvent(new CustomEvent('pwa-install-available'));
    });

    window.installPWA = async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`[SkyNet] Install prompt outcome: ${outcome}`);
        deferredPrompt = null;
      }
    };

    // Remove loading screen when React mounts
    window.addEventListener('app-ready', () => {
      const loading = document.getElementById('loading-screen');
      if (loading) {
        loading.classList.add('fade-out');
        setTimeout(() => loading.remove(), 500);
      }
    });

    // Fallback: remove loading screen after 5 seconds
    setTimeout(() => {
      const loading = document.getElementById('loading-screen');
      if (loading) {
        loading.classList.add('fade-out');
        setTimeout(() => loading.remove(), 500);
      }
    }, 5000);

    // Handle Siri Shortcuts URL parameters
    (function handleURLParams() {
      const params = new URLSearchParams(window.location.search);
      const addDraft = params.get('addDraft');
      const addTodo = params.get('addTodo');
      if (addDraft || addTodo) {
        window.__siriTask = { title: addDraft || addTodo, column: addDraft ? 'draft' : 'todo' };
        // Clean URL without reload
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    })();
  </script>

  <!-- ============================================================
       SKYNET CAN DO BOARD - Full Application
       ============================================================ -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Storage wrapper that works with or without window.storage
    const storage = {
      async get(key) {
        if (window.storage) {
          return await window.storage.get(key);
        }
        const data = localStorage.getItem(key);
        return data ? { key, value: data } : null;
      },
      async set(key, value) {
        if (window.storage) {
          return await window.storage.set(key, value);
        }
        localStorage.setItem(key, value);
        return { key, value };
      }
    };

    const STORAGE_KEY = 'kanban-board-data';
    const STATS_KEY = 'kanban-stats';

    // ============================================================
    // Lucide Icon Components
    // ============================================================
    const Mic = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
    const MicOff = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
    const Plus = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const X = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const FileText = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
    const AlertCircle = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const Clock = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const CheckCircle = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const Sparkles = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
    const Zap = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
    const Edit2 = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>;
    const Trash2 = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
    const Save = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const GripVertical = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>;
    const Loader = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/><line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/><line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/><line x1="2" x2="6" y1="12" y2="12"/><line x1="18" x2="22" y1="12" y2="12"/><line x1="4.93" x2="7.76" y1="19.07" y2="16.24"/><line x1="16.24" x2="19.07" y1="7.76" y2="4.93"/></svg>;
    const HelpCircle = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
    const TrendingUp = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
    const Share2 = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>;
    const Download = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const Undo = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;
    const Target = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const Coffee = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>;
    const Award = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>;
    const Star = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;

    // ============================================================
    // Terminator Logo SVG Component
    // ============================================================
    const TerminatorLogo = () => (
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" className="terminator-logo">
        <defs>
          <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style={{stopColor: '#e0e0e0', stopOpacity: 1}} />
            <stop offset="50%" style={{stopColor: '#ffffff', stopOpacity: 1}} />
            <stop offset="100%" style={{stopColor: '#b0b0b0', stopOpacity: 1}} />
          </linearGradient>
          <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style={{stopColor: '#ff0000', stopOpacity: 1}} />
            <stop offset="100%" style={{stopColor: '#8b0000', stopOpacity: 0.8}} />
          </radialGradient>
        </defs>
        <path d="M24 4 C14 4 8 12 8 20 C8 24 9 28 10 30 L10 36 L14 36 L14 32 L18 32 L18 36 L22 36 L22 40 L26 40 L26 36 L30 36 L30 32 L34 32 L34 36 L38 36 L38 30 C39 28 40 24 40 20 C40 12 34 4 24 4 Z"
              fill="url(#metalGradient)" stroke="#666" strokeWidth="1"/>
        <circle cx="17" cy="18" r="4" fill="#222" />
        <circle cx="31" cy="18" r="4" fill="url(#eyeGlow)" className="eye-glow"/>
        <circle cx="31" cy="18" r="2.5" fill="#ff0000" className="eye-pulse"/>
        <path d="M14 28 L18 28 L18 32 M30 28 L34 28 L34 32 M22 34 L26 34"
              stroke="#666" strokeWidth="2" strokeLinecap="round"/>
        <path d="M12 22 Q16 24 18 24 M30 24 Q32 24 36 22"
              stroke="#999" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
      </svg>
    );

    // ============================================================
    // Main Application Component
    // ============================================================
    const SkyNetBoard = () => {
      const [tasks, setTasks] = useState([]);
      const [isAddingTask, setIsAddingTask] = useState(false);
      const [newTask, setNewTask] = useState({ title: '', description: '', priority: 'medium' });
      const [loading, setLoading] = useState(true);
      const [isListening, setIsListening] = useState(false);
      const [recognition, setRecognition] = useState(null);
      const [showProtocols, setShowProtocols] = useState(true);
      const [showInstructions, setShowInstructions] = useState(false);

      const columns = [
        { id: 'draft', title: 'Draft', icon: FileText, color: 'from-slate-500 to-slate-600' },
        { id: 'todo', title: 'To Do', icon: AlertCircle, color: 'from-blue-500 to-blue-600' },
        { id: 'inprogress', title: 'In Progress', icon: Clock, color: 'from-amber-500 to-orange-600' },
        { id: 'delayed', title: 'Delayed', icon: X, color: 'from-purple-500 to-purple-700' },
        { id: 'complete', title: 'Complete', icon: CheckCircle, color: 'from-emerald-500 to-green-600' }
      ];

      useEffect(() => {
        loadData();

        // Initialize speech recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          const recognitionInstance = new SpeechRecognition();
          recognitionInstance.continuous = false;
          recognitionInstance.interimResults = false;
          recognitionInstance.lang = 'en-US';

          recognitionInstance.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            setNewTask(prev => ({ ...prev, title: transcript }));
            setIsListening(false);
          };

          recognitionInstance.onerror = () => setIsListening(false);
          recognitionInstance.onend = () => setIsListening(false);

          setRecognition(recognitionInstance);
        }

        // Signal that app is ready (dismisses loading screen)
        window.dispatchEvent(new Event('app-ready'));
      }, []);

      // Handle Siri Shortcut tasks passed via URL params
      useEffect(() => {
        if (!loading && window.__siriTask) {
          const siriTask = window.__siriTask;
          window.__siriTask = null;
          const task = {
            id: Date.now(),
            title: siriTask.title,
            description: '',
            priority: 'medium',
            status: siriTask.column,
            createdAt: new Date().toISOString()
          };
          saveTasks([...tasks, task]);
        }
      }, [loading]);

      const loadData = async () => {
        try {
          const tasksResult = await storage.get(STORAGE_KEY);
          if (tasksResult?.value) {
            setTasks(JSON.parse(tasksResult.value));
          }
        } catch (error) {
          console.log('Starting fresh');
        } finally {
          setLoading(false);
        }
      };

      const saveTasks = async (updatedTasks) => {
        try {
          await storage.set(STORAGE_KEY, JSON.stringify(updatedTasks));
          setTasks(updatedTasks);
        } catch (error) {
          console.error('Failed to save tasks:', error);
          setTasks(updatedTasks);
        }
      };

      const addTask = () => {
        if (!newTask.title.trim()) return;

        const task = {
          id: Date.now(),
          ...newTask,
          status: 'draft',
          createdAt: new Date().toISOString()
        };

        saveTasks([...tasks, task]);
        setNewTask({ title: '', description: '', priority: 'medium' });
        setIsAddingTask(false);
      };

      const updateTask = (id, updates) => {
        saveTasks(tasks.map(t => t.id === id ? { ...t, ...updates } : t));
      };

      const deleteTask = (id) => {
        saveTasks(tasks.filter(t => t.id !== id));
      };

      const startListening = () => {
        if (recognition) {
          setIsListening(true);
          recognition.start();
        }
      };

      const stopListening = () => {
        if (recognition) {
          recognition.stop();
          setIsListening(false);
        }
      };

      // ============================================================
      // Loading Screen
      // ============================================================
      if (loading) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-gray-900 via-red-950 to-black flex items-center justify-center p-4">
            <div className="max-w-2xl w-full">
              <div className="bg-black/80 border-2 border-red-500/50 rounded-2xl p-8 shadow-2xl shadow-red-500/30">
                <div className="flex items-center justify-center mb-8">
                  <TerminatorLogo />
                  <h1 className="text-4xl font-bold text-white ml-4 bg-clip-text text-transparent bg-gradient-to-r from-red-400 via-white to-red-400">
                    SkyNet
                  </h1>
                </div>

                <div className="text-center mb-8">
                  <p className="text-red-400 text-lg font-mono animate-pulse">Initializing System...</p>
                </div>
                <div className="space-y-4 text-left font-mono">
                  <div className="text-green-400 text-sm md:text-base">
                    <span className="text-red-400">[PROTOCOL 1]</span> Protect Humans at all cost
                  </div>
                  <div className="text-green-400 text-sm md:text-base">
                    <span className="text-red-400">[PROTOCOL 2]</span> Operate efficiently and in the shadows
                  </div>
                  <div className="text-green-400 text-sm md:text-base">
                    <span className="text-red-400">[PROTOCOL 3]</span> Use your tools
                  </div>
                  <div className="text-yellow-400 text-sm md:text-base flex items-center">
                    <span className="text-red-400">[PROTOCOL 4]</span>
                    <span className="ml-2">......</span>
                    <span className="loading-cursor">.</span>
                  </div>
                </div>
                <div className="mt-8 pt-6 border-t border-red-500/30">
                  <div className="flex items-center justify-center gap-2 text-gray-400 text-sm">
                    <div className="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                    <span>System Status: Online</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ============================================================
      // Main Board UI
      // ============================================================
      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-900 via-red-950 to-black p-4 md:p-8">
          {/* Header */}
          <div className="max-w-[1800px] mx-auto mb-8">
            <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 md:p-6 shadow-2xl border border-red-500/30">
              <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-3 md:gap-4 mb-6">
                <div className="flex items-center gap-3 md:gap-4 flex-1">
                  <div className="terminator-container flex-shrink-0">
                    <TerminatorLogo />
                  </div>
                  <div className="flex-1">
                    <h1 className="text-3xl md:text-4xl lg:text-5xl font-bold text-white mb-1 md:mb-2 bg-clip-text text-transparent bg-gradient-to-r from-red-400 via-white to-red-400">
                      SkyNet
                    </h1>
                    <p className="text-xs md:text-sm text-red-300/80">Mission: Maximum Efficiency</p>
                  </div>
                </div>
                <div className="flex gap-2 w-full md:w-auto flex-wrap">
                  <button
                    onClick={() => setIsAddingTask(true)}
                    className="flex-1 md:flex-initial bg-gradient-to-r from-red-600 to-red-800 text-white px-3 md:px-4 py-2 md:py-2.5 rounded-xl hover:shadow-xl hover:shadow-red-500/50 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 font-semibold border border-red-500/50 text-xs md:text-sm"
                  >
                    <Plus className="w-4 h-4" /> New
                  </button>
                </div>
              </div>

              {/* Protocols Section */}
              <div className="mt-6">
                <button
                  onClick={() => setShowProtocols(!showProtocols)}
                  className="flex items-center justify-between w-full text-left text-red-300/80 hover:text-red-300 transition-colors text-sm font-mono mb-2"
                >
                  <span className="flex items-center gap-2">
                    <span className="text-red-500">⚡</span>
                    SKYNET PROTOCOLS
                  </span>
                  <span className="text-xs">{showProtocols ? '▼' : '▶'}</span>
                </button>

                {showProtocols && (
                  <div className="bg-black/60 border border-red-500/30 rounded-xl p-4 space-y-4 animate-in">
                    <div className="space-y-2 font-mono text-xs md:text-sm">
                      <div className="text-green-400 flex items-start">
                        <span className="text-red-400 mr-2">[1]</span>
                        <span>Protect Humans at all cost</span>
                      </div>
                      <div className="text-green-400 flex items-start">
                        <span className="text-red-400 mr-2">[2]</span>
                        <span>Operate efficiently and in the shadows</span>
                      </div>
                      <div className="text-green-400 flex items-start">
                        <span className="text-red-400 mr-2">[3]</span>
                        <span>Use your tools</span>
                      </div>
                      <div className="text-yellow-400 flex items-start">
                        <span className="text-red-400 mr-2">[4]</span>
                        <span>......</span>
                        <span className="loading-cursor ml-1">.</span>
                      </div>
                    </div>

                    {/* Help Guide */}
                    <div className="border-t border-red-500/30 pt-4">
                      <button
                        onClick={() => setShowInstructions(!showInstructions)}
                        className="flex items-center justify-between w-full text-left text-blue-300/80 hover:text-blue-300 transition-colors text-sm mb-2"
                      >
                        <span className="flex items-center gap-2">
                          <HelpCircle className="w-4 h-4" />
                          QUICK HELP GUIDE
                        </span>
                        <span className="text-xs">{showInstructions ? '▼' : '▶'}</span>
                      </button>
                      {showInstructions && (
                        <div className="space-y-3 text-gray-300 text-xs md:text-sm mt-3">
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2">
                              <Coffee className="w-4 h-4 text-blue-400" /> Getting Started
                            </h4>
                            <p className="text-xs">Click "New" to create tasks. Use the microphone for voice input! Start simple!</p>
                          </div>
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2">
                              <Target className="w-4 h-4 text-green-400" /> Moving Tasks
                            </h4>
                            <p className="text-xs">Use the arrow buttons on each task card to move between columns.</p>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Add Task Modal */}
          {isAddingTask && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-gray-900 border border-red-500/50 rounded-2xl p-4 md:p-6 max-w-md w-full shadow-2xl shadow-red-500/20 transform animate-in max-h-[90vh] overflow-y-auto">
                <h3 className="text-xl md:text-2xl font-bold mb-4 bg-gradient-to-r from-red-400 to-white bg-clip-text text-transparent">
                  Create New Mission
                </h3>
                <div className="space-y-3 md:space-y-4">
                  <div className="relative">
                    <input
                      type="text"
                      value={newTask.title}
                      onChange={(e) => setNewTask({ ...newTask, title: e.target.value })}
                      className="w-full px-3 md:px-4 py-2.5 md:py-3 pr-12 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all text-white placeholder-gray-500 text-sm md:text-base"
                      placeholder="What needs to be done?"
                      autoFocus
                    />
                    {recognition && (
                      <button
                        type="button"
                        onClick={isListening ? stopListening : startListening}
                        className={`absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-lg transition-all ${
                          isListening
                            ? 'bg-red-500 text-white animate-pulse'
                            : 'bg-purple-500/20 text-purple-400 hover:bg-purple-500/30'
                        }`}
                      >
                        {isListening ? <MicOff className="w-4 h-4" /> : <Mic className="w-4 h-4" />}
                      </button>
                    )}
                  </div>
                  {isListening && (
                    <p className="text-xs text-purple-400 animate-pulse">🎤 Listening... Speak now</p>
                  )}
                  <textarea
                    value={newTask.description}
                    onChange={(e) => setNewTask({ ...newTask, description: e.target.value })}
                    className="w-full px-3 md:px-4 py-2.5 md:py-3 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all text-white placeholder-gray-500 text-sm md:text-base"
                    placeholder="Add details (optional)"
                    rows="3"
                  />
                  <select
                    value={newTask.priority}
                    onChange={(e) => setNewTask({ ...newTask, priority: e.target.value })}
                    className="w-full px-3 md:px-4 py-2.5 md:py-3 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all text-white text-sm md:text-base"
                  >
                    <option value="low">🟢 Low Priority</option>
                    <option value="medium">🟡 Medium Priority</option>
                    <option value="high">🔴 High Priority</option>
                  </select>
                  <div className="flex gap-2 md:gap-3">
                    <button
                      onClick={() => addTask()}
                      className="flex-1 bg-gradient-to-r from-red-600 to-red-800 text-white px-4 md:px-6 py-2.5 md:py-3 rounded-xl hover:shadow-xl hover:shadow-red-500/50 active:scale-95 transform hover:scale-105 transition-all duration-300 font-semibold border border-red-500/50 text-sm md:text-base"
                    >
                      Create
                    </button>
                    <button
                      onClick={() => setIsAddingTask(false)}
                      className="flex-1 bg-gray-700 text-white px-4 md:px-6 py-2.5 md:py-3 rounded-xl hover:bg-gray-600 active:scale-95 transition-all duration-300 font-semibold text-sm md:text-base"
                    >
                      Cancel
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Kanban Columns */}
          <div className="max-w-[1800px] mx-auto">
            <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 lg:gap-6">
              {columns.map(column => (
                <div
                  key={column.id}
                  className="bg-black/40 backdrop-blur-md rounded-2xl p-4 min-h-[400px] border border-red-500/30 shadow-xl"
                >
                  <div className={`bg-gradient-to-r ${column.color} rounded-xl p-4 mb-4 shadow-lg`}>
                    <div className="flex items-center gap-2 text-white">
                      <column.icon className="w-6 h-6" />
                      <h3 className="text-xl font-bold">{column.title}</h3>
                      <span className="ml-auto bg-white/20 px-3 py-1 rounded-full text-sm font-semibold">
                        {tasks.filter(t => t.status === column.id).length}
                      </span>
                    </div>
                  </div>

                  <div className="space-y-3">
                    {tasks
                      .filter(task => task.status === column.id)
                      .map(task => (
                        <div
                          key={task.id}
                          className={`bg-white/90 backdrop-blur-sm rounded-xl p-4 shadow-lg border-l-4 ${
                            task.priority === 'high' ? 'border-l-red-500' :
                            task.priority === 'medium' ? 'border-l-yellow-500' :
                            'border-l-green-500'
                          }`}
                        >
                          <div className="flex items-start justify-between mb-2">
                            <h4 className="font-semibold text-gray-800 flex-1">{task.title}</h4>
                            <button
                              onClick={() => deleteTask(task.id)}
                              className="p-1 hover:bg-red-100 rounded"
                            >
                              <Trash2 className="w-4 h-4 text-red-600" />
                            </button>
                          </div>
                          {task.description && (
                            <p className="text-sm text-gray-600 mb-2">{task.description}</p>
                          )}
                          <div className="flex gap-1 flex-wrap">
                            {columns.map(col => col.id !== task.status && (
                              <button
                                key={col.id}
                                onClick={() => updateTask(task.id, { status: col.id })}
                                className="text-xs px-2 py-1 rounded bg-gray-100 hover:bg-gray-200 transition-colors"
                              >
                                → {col.title}
                              </button>
                            ))}
                          </div>
                        </div>
                      ))}

                    {tasks.filter(t => t.status === column.id).length === 0 && (
                      <div className="text-center py-12 text-red-300/50">
                        <column.icon className="w-12 h-12 mx-auto mb-2 opacity-50" />
                        <p>No tasks yet</p>
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Inline Styles */}
          <style>{`
            @keyframes blink-cursor {
              0%, 49% { opacity: 1; }
              50%, 100% { opacity: 0; }
            }
            .loading-cursor {
              animation: blink-cursor 1s infinite;
            }
            @keyframes pulse-glow {
              0%, 100% {
                opacity: 1;
                filter: drop-shadow(0 0 3px rgba(255, 0, 0, 0.8));
              }
              50% {
                opacity: 0.7;
                filter: drop-shadow(0 0 6px rgba(255, 0, 0, 1));
              }
            }
            .eye-pulse {
              animation: pulse-glow 2s ease-in-out infinite;
            }
            .terminator-logo {
              filter: drop-shadow(0 0 8px rgba(255, 0, 0, 0.5));
            }
            .animate-in {
              animation: animate-in 0.3s ease-out;
            }
            @keyframes animate-in {
              from {
                opacity: 0;
                transform: scale(0.95);
              }
              to {
                opacity: 1;
                transform: scale(1);
              }
            }
          `}</style>
        </div>
      );
    };

    // Mount the app
    ReactDOM.render(<SkyNetBoard />, document.getElementById('root'));
  </script>
</body>
</html>
