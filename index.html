      // 芒聰聙芒聰聙 CRUD 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      const addTask = async () => {
        if (!newTask.title.trim()) return;
        await addTaskDirect({ ...newTask, status: 'draft' });
        setNewTask({ title: '', description: '', priority: 'medium', due_date: '' });
        setIsAddingTask(false);
      };

      const addTaskDirect = async (fields) => {
        setSyncStatus('syncing');
        const task = { id: genId(), user_id: user.id, ...fields };
        setTasks(prev => [...prev, task]);
        const { error } = await window._sb.from('tasks').insert(task);
        setSyncStatus(error ? 'error' : 'synced');
        // If added directly to todo, trigger AI analysis
        if (fields.status === 'todo') {
          triggerAIAnalysis(task.id, fields.title, fields.description);
        }
      };

      const updateTask = async (id, updates) => {
        setSyncStatus('syncing');
        const task = tasks.find(t => t.id === id);
        setTasks(prev => prev.map(t => t.id === id ? { ...t, ...updates } : t));
        const { error } = await window._sb.from('tasks').update(updates).eq('id', id);
        setSyncStatus(error ? 'error' : 'synced');
        // Trigger AI analysis when moved TO "todo" column
        if (updates.status === 'todo' && task && task.status !== 'todo') {
          triggerAIAnalysis(id, task.title, task.description);
        }
      };

      const deleteTask = async (id) => {
        setSyncStatus('syncing');
        setTasks(prev => prev.filter(t => t.id !== id));
        setAiAnalyses(prev => { const next = {...prev}; delete next[id]; return next; });
        const { error } = await window._sb.from('tasks').delete().eq('id', id);
        setSyncStatus(error ? 'error' : 'synced');
      };

      const signOut = () => window._sb.auth.signOut();

      // 芒聰聙芒聰聙 Outlook calendar 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      const addToOutlook = (task) => {
        const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
        const date = task.due_date || tomorrow;
        const url = [
          'https://outlook.office.com/calendar/action/compose',
          '?subject=', encodeURIComponent(task.title),
          '&body=',    encodeURIComponent(task.description || ''),
          '&startdt=', date + 'T09:00:00',
          '&enddt=',   date + 'T10:00:00'
        ].join('');
        window.open(url, '_blank');
      };

      // 芒聰聙芒聰聙 Confetti on complete 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      const fireConfetti = () => {
        const colors = ['#dc2626', '#ef4444', '#f59e0b', '#10b981', '#8b5cf6', '#ffffff'];
        const container = document.createElement('div');
        container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:99999;overflow:hidden';
        document.body.appendChild(container);
        for (let i = 0; i < 60; i++) {
          const p = document.createElement('div');
          const size = Math.random() * 8 + 4;
          p.style.cssText = `position:absolute;width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;top:-10px;border-radius:${Math.random()>0.5?'50%':'2px'};opacity:1;`;
          p.animate([
            { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
            { transform: `translateY(${window.innerHeight+50}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
          ], { duration: 1500 + Math.random() * 1500, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' });
          container.appendChild(p);
        }
        setTimeout(() => container.remove(), 3500);
      };

      const moveTask = (id, newStatus) => {
        const task = tasks.find(t => t.id === id);
        if (newStatus === 'complete' && task && task.status !== 'complete') fireConfetti();
        updateTask(id, { status: newStatus });
      };

      // 芒聰聙芒聰聙 Auth / Loading gates 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      if (!authReady) return null;
      if (!user) return <AuthScreen />;
      if (loading) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-gray-900 via-red-950 to-black flex items-center justify-center">
            <div className="text-center">
              <div className="loading-eye mx-auto" style={{width:60,height:60,borderRadius:'50%',background:'radial-gradient(circle,#dc2626 0%,#991b1b 40%,transparent 70%)',animation:'pulse-eye 1.5s ease-in-out infinite',boxShadow:'0 0 40px #dc2626'}}/>
              <p className="text-red-400 font-mono text-sm mt-6 tracking-widest">LOADING MISSION DATA...</p>
            </div>
          </div>
        );
      }

      // 芒聰聙芒聰聙 Sync badge 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      const SyncBadge = () => {
        const cfg = {
          syncing: { color: 'text-yellow-400', label: 'Syncing...' },
          synced:  { color: 'text-green-400',  label: '芒聹聯 Synced'  },
          error:   { color: 'text-red-400',    label: '芒聹聴 Sync error' },
          idle:    { color: 'text-gray-500',   label: '' }
        }[syncStatus];
        if (!cfg.label) return null;
        return <span className={`text-xs font-mono ${cfg.color} ml-2`}>{cfg.label}</span>;
      };

      // AI is always active (built-in engine, no API key needed)

      // 芒聰聙芒聰聙 Main UI 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-900 via-red-950 to-black p-4 md:p-8">

          {/* Header */}
          <div className="max-w-[1800px] mx-auto mb-8">
            <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 md:p-6 shadow-2xl border border-red-500/30">
              <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-3 mb-6">
                <div className="flex items-center gap-3 flex-1">
                  <TerminatorLogo />
                  <div className="flex-1">
                    <div className="flex items-center flex-wrap">
                      <h1 className="text-3xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-red-400 via-white to-red-400">SkyNet</h1>
                      <SyncBadge />
                    </div>
                    <p className="text-xs text-red-300/60 font-mono truncate max-w-xs">{user.email}</p>
                  </div>
                </div>
                <div className="flex gap-2 w-full md:w-auto">
                  <button onClick={() => setIsAddingTask(true)}
                    className="flex-1 md:flex-initial bg-gradient-to-r from-red-600 to-red-800 text-white px-4 py-2.5 rounded-xl hover:shadow-xl hover:shadow-red-500/50 active:scale-95 transition-all flex items-center justify-center gap-2 font-semibold border border-red-500/50 text-sm">
                    <Plus className="w-4 h-4" /> New
                  </button>
                  <button onClick={signOut} title="Sign out"
                    className="bg-gray-700/50 text-gray-300 hover:text-white px-3 py-2.5 rounded-xl hover:bg-gray-600/50 active:scale-95 transition-all border border-gray-600/30">
                    <LogOut className="w-4 h-4" />
                  </button>
                </div>
              </div>

              {/* Protocols */}
              <div className="mt-2">
                <button onClick={() => setShowProtocols(!showProtocols)} className="flex items-center justify-between w-full text-left text-red-300/80 hover:text-red-300 transition-colors text-sm font-mono mb-2">
                  <span className="flex items-center gap-2"><span className="text-red-500">芒職隆</span> SKYNET PROTOCOLS</span>
                  <span className="text-xs">{showProtocols ? '芒聳录' : '芒聳露'}</span>
                </button>
                {showProtocols && (
                  <div className="bg-black/60 border border-red-500/30 rounded-xl p-4 space-y-4 animate-in">
                    <div className="space-y-2 font-mono text-xs md:text-sm">
                      <div className="text-green-400"><span className="text-red-400 mr-2">[1]</span>Protect Humans at all cost</div>
                      <div className="text-green-400"><span className="text-red-400 mr-2">[2]</span>Operate efficiently and in the shadows</div>
                      <div className="text-green-400"><span className="text-red-400 mr-2">[3]</span>Use your tools</div>
                      <div className="text-green-400"><span className="text-red-400 mr-2">[4]</span>AI Task Analysis: <span className="text-emerald-400">ONLINE</span></div>
                      <div className="text-yellow-400"><span className="text-red-400 mr-2">[5]</span>......<span className="loading-cursor ml-1">.</span></div>
                    </div>
                    <div className="border-t border-red-500/30 pt-4">
                      <button onClick={() => setShowInstructions(!showInstructions)} className="flex items-center justify-between w-full text-left text-blue-300/80 hover:text-blue-300 transition-colors text-sm mb-2">
                        <span className="flex items-center gap-2"><HelpCircle className="w-4 h-4" /> QUICK HELP GUIDE</span>
                        <span className="text-xs">{showInstructions ? '芒聳录' : '芒聳露'}</span>
                      </button>
                      {showInstructions && (
                        <div className="space-y-3 text-gray-300 text-xs mt-3">
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2"><Coffee className="w-4 h-4 text-blue-400" /> Getting Started</h4>
                            <p>Click "New" to create tasks. Use the microphone for voice input!</p>
                          </div>
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2"><Target className="w-4 h-4 text-green-400" /> Moving Tasks</h4>
                            <p>Use the arrow buttons on each card to move between columns.</p>
                          </div>
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2"><Brain className="w-4 h-4 text-purple-400" /> AI Analysis</h4>
                            <p>Move any task to "To Do" and SkyNet automatically generates subtasks, time estimates, and tips. No setup needed.</p>
                          </div>
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2"><CalendarPlus className="w-4 h-4 text-blue-400" /> Outlook Calendar</h4>
                            <p>Tap the calendar icon on any task to open it as an Outlook event.</p>
                          </div>
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2"><Wifi className="w-4 h-4 text-green-400" /> Cross-Device Sync</h4>
                            <p>Sign in with the same email on any device and your tasks sync automatically.</p>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Add Task Modal */}
          {isAddingTask && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-gray-900 border border-red-500/50 rounded-2xl p-6 max-w-md w-full shadow-2xl shadow-red-500/20 animate-in max-h-[90vh] overflow-y-auto">
                <h3 className="text-2xl font-bold mb-4 bg-gradient-to-r from-red-400 to-white bg-clip-text text-transparent">Create New Mission</h3>
                <div className="space-y-4">
                  <div className="relative">
                    <input type="text" value={newTask.title} onChange={e => setNewTask({ ...newTask, title: e.target.value })}
                      className="w-full px-4 py-3 pr-12 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent text-white placeholder-gray-500"
                      placeholder="What needs to be done?" autoFocus />
                    {recognition && (
                      <button type="button" onClick={() => isListening ? (recognition.stop(), setIsListening(false)) : (setIsListening(true), recognition.start())}
                        className={`absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-lg transition-all ${isListening ? 'bg-red-500 text-white animate-pulse' : 'bg-purple-500/20 text-purple-400 hover:bg-purple-500/30'}`}>
                        {isListening ? <MicOff className="w-4 h-4" /> : <Mic className="w-4 h-4" />}
                      </button>
                    )}
                  </div>
                  {isListening && <p className="text-xs text-purple-400 animate-pulse">冒聼聨陇 Listening... Speak now</p>}
                  <textarea value={newTask.description} onChange={e => setNewTask({ ...newTask, description: e.target.value })}
                    className="w-full px-4 py-3 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent text-white placeholder-gray-500"
                    placeholder="Add details (optional)" rows="3" />
                  <select value={newTask.priority} onChange={e => setNewTask({ ...newTask, priority: e.target.value })}
                    className="w-full px-4 py-3 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent text-white">
                    <option value="low">冒聼聼垄 Low Priority</option>
                    <option value="medium">冒聼聼隆 Medium Priority</option>
                    <option value="high">冒聼聰麓 High Priority</option>
                  </select>
                  <div>
                    <label className="text-xs text-gray-400 mb-1 block">Due Date (optional 芒聙聰 for Outlook calendar)</label>
                    <input type="date" value={newTask.due_date} onChange={e => setNewTask({ ...newTask, due_date: e.target.value })}
                      className="w-full px-4 py-3 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent text-white" />
                  </div>
                  <div className="flex gap-3">
                    <button onClick={addTask} className="flex-1 bg-gradient-to-r from-red-600 to-red-800 text-white px-6 py-3 rounded-xl hover:shadow-xl hover:shadow-red-500/50 active:scale-95 transition-all font-semibold border border-red-500/50">Create</button>
                    <button onClick={() => setIsAddingTask(false)} className="flex-1 bg-gray-700 text-white px-6 py-3 rounded-xl hover:bg-gray-600 active:scale-95 transition-all font-semibold">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Kanban Columns */}
          <div className="max-w-[1800px] mx-auto">
            <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 lg:gap-6">
              {columns.map(column => (
                <div key={column.id} className="bg-black/40 backdrop-blur-md rounded-2xl p-4 min-h-[400px] border border-red-500/30 shadow-xl">
                  <div className={`bg-gradient-to-r ${column.color} rounded-xl p-4 mb-4 shadow-lg`}>
                    <div className="flex items-center gap-2 text-white">
                      <column.icon className="w-6 h-6" />
                      <h3 className="text-xl font-bold">{column.title}</h3>
                      <span className="ml-auto bg-white/20 px-3 py-1 rounded-full text-sm font-semibold">
                        {tasks.filter(t => t.status === column.id).length}
                      </span>
                    </div>
                  </div>

                  <div className="space-y-3">
                    {tasks
                      .filter(task => task.status === column.id)
                      .map(task => {
                        const ai = aiAnalyses[task.id];
                        return (
                          <div key={task.id} className={`bg-white/90 backdrop-blur-sm rounded-xl p-4 shadow-lg border-l-4 ${
                            task.priority === 'high' ? 'border-l-red-500' :
                            task.priority === 'medium' ? 'border-l-yellow-500' : 'border-l-green-500'
                          }`}>
                            <div className="flex items-start justify-between mb-2">
                              <h4 className="font-semibold text-gray-800 flex-1 pr-1">{task.title}</h4>
                              <div className="flex gap-1 flex-shrink-0">
                                {/* Re-analyze with AI */}
                                {column.id === 'todo' && (
                                  <button onClick={() => triggerAIAnalysis(task.id, task.title, task.description)} title="AI Analyze"
                                    className="p-1 hover:bg-purple-100 rounded transition-colors">
                                    <Sparkles className="w-4 h-4 text-purple-600" />
                                  </button>
                                )}pan>
                    </div>
                  </div>

                  <div className="space-y-3">
                    {tasks
                      .filter(task => task.status === column.id)
                      .map(task => {
                        const ai = aiAnalyses[task.id];
                        return (
                          <div key={task.id} className={`bg-white/90 backdrop-blur-sm rounded-xl p-4 shadow-lg border-l-4 ${
                            task.priority === 'high' ? 'border-l-red-500' :
                            task.priority === 'medium' ? 'border-l-yellow-500' : 'border-l-green-500'
                          }`}>
                            <div className="flex items-start justify-between mb-2">
                              <h4 className="font-semibold text-gray-800 flex-1 pr-1">{task.title}</h4>
                              <div className="flex gap-1 flex-shrink-0">
                                {/* Re-analyze with AI */}
                                {column.id === 'todo' && (
                                  <button onClick={() => triggerAIAnalysis(task.id, task.title, task.description)} title="AI Analyze"
                                    className="p-1 hover:bg-purple-100 rounded transition-colors">
                                    <Sparkles className="w-4 h-4 text-purple-600" />
                                  </button>
                                )}
                                <button onClick={() => addToOutlook(task)} title="Add to Outlook Calendar"
                                  className="p-1 hover:bg-blue-100 rounded transition-colors">
                                  <CalendarPlus className="w-4 h-4 text-blue-600" />
                                </button>
                                <button onClick={() => deleteTask(task.id)} className="p-1 hover:bg-red-100 rounded transition-colors">
                                  <Trash2 className="w-4 h-4 text-red-600" />
                                </button>
                              </div>
                            </div>

                            {task.description && <p className="text-sm text-gray-600 mb-2">{task.description}</p>}
                            {task.due_date && <p className="text-xs text-blue-600 mb-2 font-medium">冒聼聯聟 {task.due_date}</p>}

                            {/* AI Analysis Display */}
                            {ai && <AIAnalysis analysis={ai.analysis} />}
                            {!ai && task.ai_analysis && <AIAnalysis analysis={task.ai_analysis} />}

                            <div className="flex gap-1 flex-wrap mt-2">

                                <button key={col.id} onClick={() => moveTask(task.id, col.id)}

                                  芒聠聮 {col.title}
                                </button>
                              ))}
                            </div>
                          </div>
                        );
                      })}

                    {tasks.filter(t => t.status === column.id).length === 0 && (
                      <div className="text-center py-12 text-red-300/50">
                        <column.icon className="w-12 h-12 mx-auto mb-2 opacity-50" />

                      </div>

                </div>
              ))}

          </div>

          <style>{`
            @keyframes blink-cursor { 0%,49%{opacity:1} 50%,100%{opacity:0} }

              0%,100%{opacity:1;filter:drop-shadow(0 0 3px rgba(255,0,0,0.8))}
              50%{opacity:0.7;filter:drop-shadow(0 0 6px rgba(255,0,0,1))}

            .eye-pulse { animation: pulse-glow 2s ease-in-out infinite; }
            .terminator-logo { filter: drop-shadow(0 0 8px rgba(255,0,0,0.5)); }

    };

    ReactDOM.render(<SkyNetBoard />, document.getElementById('root'));
