<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#dc2626">
  <meta name="description" content="SkyNet - AI-powered productivity board with voice commands, Siri integration, and task analysis">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Can Do Board">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="msapplication-TileColor" content="#0f172a">
  <title>SkyNet - Can Do Board</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://cdn.tailwindcss.com">

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #ef4444; }
    @media all and (display-mode: standalone) {
      body { padding-top: env(safe-area-inset-top); }
    }
    #loading-screen {
      position: fixed; inset: 0; background: #0f172a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .loading-eye {
      width: 60px; height: 60px; border-radius: 50%;
      background: radial-gradient(circle, #dc2626 0%, #991b1b 40%, transparent 70%);
      animation: pulse-eye 1.5s ease-in-out infinite;
      box-shadow: 0 0 40px #dc2626, 0 0 80px rgba(220,38,38,0.3);
    }
    @keyframes pulse-eye {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }
    .loading-text {
      margin-top: 24px; color: #dc2626;
      font-family: 'Courier New', monospace; font-size: 14px;
      letter-spacing: 3px; text-transform: uppercase;
    }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-eye"></div>
    <div class="loading-text">SkyNet Initializing...</div>
  </div>
  <div id="root"></div>

  <script>
    // ── Supabase init ──────────────────────────────────────────────
    const SUPABASE_URL = 'https://xujwsabyrkyjulwisfct.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1andzYWJ5cmt5anVsd2lzZmN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDcyMDIsImV4cCI6MjA4NzYyMzIwMn0.sL2a3yztoQgRFAX4WnoVoUqezV6b_6MD4l_PiNS4QNs';
    window._sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── Service Worker ─────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(r => { setInterval(() => r.update(), 3600000); })
          .catch(e => console.warn('[SkyNet] SW failed:', e));
      });
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      window.dispatchEvent(new CustomEvent('pwa-install-available'));
    });
    window.installPWA = async () => {
      if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
    };

    window.addEventListener('app-ready', () => {
      const el = document.getElementById('loading-screen');
      if (el) { el.classList.add('fade-out'); setTimeout(() => el.remove(), 500); }
    });
    setTimeout(() => {
      const el = document.getElementById('loading-screen');
      if (el) { el.classList.add('fade-out'); setTimeout(() => el.remove(), 500); }
    }, 5000);

    (function handleURLParams() {
      const p = new URLSearchParams(window.location.search);
      const addDraft = p.get('addDraft'), addTodo = p.get('addTodo');
      if (addDraft || addTodo) {
        window.__siriTask = { title: addDraft || addTodo, column: addDraft ? 'draft' : 'todo' };
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Simple UUID fallback ───────────────────────────────────────
    const genId = () => {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    };

    // ── SVG Icons ─────────────────────────────────────────────────
    const Mic = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
    const MicOff = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/><path d="M5 10v2a7 7 0 0 0 12 5"/><path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
    const Plus = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const X = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const FileText = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
    const AlertCircle = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
    const Clock = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const CheckCircle = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const Trash2 = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
    const HelpCircle = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>;
    const Coffee = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>;
    const Target = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
    const LogOut = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>;
    const CalendarPlus = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 13V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><line x1="19" x2="19" y1="16" y2="22"/><line x1="16" x2="22" y1="19" y2="19"/></svg>;
    const Wifi = p => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>;

    // ── Terminator Logo ────────────────────────────────────────────
    const TerminatorLogo = () => (
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" className="terminator-logo">
        <defs>
          <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style={{stopColor:'#e0e0e0',stopOpacity:1}}/>
            <stop offset="50%" style={{stopColor:'#ffffff',stopOpacity:1}}/>
            <stop offset="100%" style={{stopColor:'#b0b0b0',stopOpacity:1}}/>
          </linearGradient>
          <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style={{stopColor:'#ff0000',stopOpacity:1}}/>
            <stop offset="100%" style={{stopColor:'#8b0000',stopOpacity:0.8}}/>
          </radialGradient>
        </defs>
        <path d="M24 4 C14 4 8 12 8 20 C8 24 9 28 10 30 L10 36 L14 36 L14 32 L18 32 L18 36 L22 36 L22 40 L26 40 L26 36 L30 36 L30 32 L34 32 L34 36 L38 36 L38 30 C39 28 40 24 40 20 C40 12 34 4 24 4 Z" fill="url(#metalGradient)" stroke="#666" strokeWidth="1"/>
        <circle cx="17" cy="18" r="4" fill="#222"/>
        <circle cx="31" cy="18" r="4" fill="url(#eyeGlow)" className="eye-glow"/>
        <circle cx="31" cy="18" r="2.5" fill="#ff0000" className="eye-pulse"/>
        <path d="M14 28 L18 28 L18 32 M30 28 L34 28 L34 32 M22 34 L26 34" stroke="#666" strokeWidth="2" strokeLinecap="round"/>
        <path d="M12 22 Q16 24 18 24 M30 24 Q32 24 36 22" stroke="#999" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
      </svg>
    );

    // ── Auth Screen ────────────────────────────────────────────────
    const AuthScreen = ({ onAuth }) => {
      const [mode, setMode] = useState('signin');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [message, setMessage] = useState('');
      const [busy, setBusy] = useState(false);

      const handleSubmit = async () => {
        if (!email || !password) { setError('Email and password required.'); return; }
        setBusy(true); setError(''); setMessage('');
        if (mode === 'signin') {
          const { error: e } = await window._sb.auth.signInWithPassword({ email, password });
          if (e) setError(e.message);
        } else {
          const { error: e } = await window._sb.auth.signUp({ email, password });
          if (e) setError(e.message);
          else setMessage('Account created! Check your email to confirm, then sign in.');
        }
        setBusy(false);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-900 via-red-950 to-black flex items-center justify-center p-4">
          <div className="max-w-md w-full">
            <div className="bg-black/80 border-2 border-red-500/50 rounded-2xl p-8 shadow-2xl shadow-red-500/30">
              <div className="flex items-center justify-center mb-8 gap-4">
                <TerminatorLogo />
                <h1 className="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-red-400 via-white to-red-400">SkyNet</h1>
              </div>
              <p className="text-center text-red-300/70 font-mono text-sm mb-8">IDENTITY VERIFICATION REQUIRED</p>

              <div className="space-y-4">
                <input
                  type="email"
                  value={email}
                  onChange={e => setEmail(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                  placeholder="Email address"
                  className="w-full px-4 py-3 rounded-xl bg-black/50 border-2 border-red-500/30 focus:border-red-500 focus:outline-none text-white placeholder-gray-500"
                />
                <input
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                  placeholder="Password"
                  className="w-full px-4 py-3 rounded-xl bg-black/50 border-2 border-red-500/30 focus:border-red-500 focus:outline-none text-white placeholder-gray-500"
                />

                {error && <p className="text-red-400 text-sm text-center">{error}</p>}
                {message && <p className="text-green-400 text-sm text-center">{message}</p>}

                <button
                  onClick={handleSubmit}
                  disabled={busy}
                  className="w-full bg-gradient-to-r from-red-600 to-red-800 text-white py-3 rounded-xl font-semibold hover:shadow-xl hover:shadow-red-500/50 transition-all disabled:opacity-50 border border-red-500/50"
                >
                  {busy ? 'Processing...' : mode === 'signin' ? 'ACCESS SYSTEM' : 'CREATE ACCOUNT'}
                </button>

                <button
                  onClick={() => { setMode(mode === 'signin' ? 'signup' : 'signin'); setError(''); setMessage(''); }}
                  className="w-full text-gray-400 hover:text-white text-sm transition-colors py-2"
                >
                  {mode === 'signin' ? 'New operative? Create account' : 'Already registered? Sign in'}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ── Main Board ─────────────────────────────────────────────────
    const SkyNetBoard = () => {
      const [user, setUser]           = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [tasks, setTasks]         = useState([]);
      const [loading, setLoading]     = useState(true);
      const [isAddingTask, setIsAddingTask] = useState(false);
      const [newTask, setNewTask]     = useState({ title: '', description: '', priority: 'medium', due_date: '' });
      const [isListening, setIsListening]   = useState(false);
      const [recognition, setRecognition]   = useState(null);
      const [showProtocols, setShowProtocols]     = useState(true);
      const [showInstructions, setShowInstructions] = useState(false);
      const [syncStatus, setSyncStatus]   = useState('idle'); // idle | syncing | synced | error
      const channelRef = useRef(null);

      const columns = [
        { id: 'draft',      title: 'Draft',       icon: FileText,    color: 'from-slate-500 to-slate-600' },
        { id: 'todo',       title: 'To Do',        icon: AlertCircle, color: 'from-blue-500 to-blue-600' },
        { id: 'inprogress', title: 'In Progress',  icon: Clock,       color: 'from-amber-500 to-orange-600' },
        { id: 'delayed',    title: 'Delayed',      icon: X,           color: 'from-purple-500 to-purple-700' },
        { id: 'complete',   title: 'Complete',     icon: CheckCircle, color: 'from-emerald-500 to-green-600' }
      ];

      // ── Auth init ────────────────────────────────────────────────
      useEffect(() => {
        window._sb.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setAuthReady(true);
        });

        const { data: { subscription } } = window._sb.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
          if (!session?.user) { setTasks([]); setLoading(false); }
        });

        return () => subscription.unsubscribe();
      }, []);

      // ── Load tasks when user is set ──────────────────────────────
      useEffect(() => {
        if (!user) return;
        loadTasks();
        setupRealtime();
        initSpeech();
        window.dispatchEvent(new Event('app-ready'));

        return () => {
          if (channelRef.current) window._sb.removeChannel(channelRef.current);
        };
      }, [user]);

      const loadTasks = async () => {
        setLoading(true);
        const { data, error } = await window._sb
          .from('tasks')
          .select('*')
          .eq('user_id', user.id)
          .order('created_at', { ascending: true });
        if (data) setTasks(data);
        setLoading(false);
      };

      const setupRealtime = () => {
        if (channelRef.current) window._sb.removeChannel(channelRef.current);
        const ch = window._sb
          .channel('tasks-live')
          .on('postgres_changes', {
            event: '*', schema: 'public', table: 'tasks',
            filter: `user_id=eq.${user.id}`
          }, payload => {
            if (payload.eventType === 'INSERT') {
              setTasks(prev => prev.some(t => t.id === payload.new.id) ? prev : [...prev, payload.new]);
            } else if (payload.eventType === 'UPDATE') {
              setTasks(prev => prev.map(t => t.id === payload.new.id ? payload.new : t));
            } else if (payload.eventType === 'DELETE') {
              setTasks(prev => prev.filter(t => t.id !== payload.old.id));
            }
          })
          .subscribe();
        channelRef.current = ch;
      };

      const initSpeech = () => {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
          const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
          const r = new SR();
          r.continuous = false; r.interimResults = false; r.lang = 'en-US';
          r.onresult = e => { setNewTask(prev => ({ ...prev, title: e.results[0][0].transcript })); setIsListening(false); };
          r.onerror = () => setIsListening(false);
          r.onend   = () => setIsListening(false);
          setRecognition(r);
        }
      };

      // ── Siri task injection ───────────────────────────────────────
      useEffect(() => {
        if (!loading && user && window.__siriTask) {
          const st = window.__siriTask; window.__siriTask = null;
          addTaskDirect({ title: st.title, description: '', priority: 'medium', due_date: '', status: st.column });
        }
      }, [loading]);

      // ── CRUD ─────────────────────────────────────────────────────
      const addTask = async () => {
        if (!newTask.title.trim()) return;
        await addTaskDirect({ ...newTask, status: 'draft' });
        setNewTask({ title: '', description: '', priority: 'medium', due_date: '' });
        setIsAddingTask(false);
      };

      const addTaskDirect = async (fields) => {
        setSyncStatus('syncing');
        const task = { id: genId(), user_id: user.id, ...fields };
        setTasks(prev => [...prev, task]);
        const { error } = await window._sb.from('tasks').insert(task);
        setSyncStatus(error ? 'error' : 'synced');
      };

      const updateTask = async (id, updates) => {
        setSyncStatus('syncing');
        setTasks(prev => prev.map(t => t.id === id ? { ...t, ...updates } : t));
        const { error } = await window._sb.from('tasks').update(updates).eq('id', id);
        setSyncStatus(error ? 'error' : 'synced');
      };

      const deleteTask = async (id) => {
        setSyncStatus('syncing');
        setTasks(prev => prev.filter(t => t.id !== id));
        const { error } = await window._sb.from('tasks').delete().eq('id', id);
        setSyncStatus(error ? 'error' : 'synced');
      };

      const signOut = () => window._sb.auth.signOut();

      // ── Outlook calendar ──────────────────────────────────────────
      const addToOutlook = (task) => {
        const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
        const date = task.due_date || tomorrow;
        const url = [
          'https://outlook.office.com/calendar/action/compose',
          '?subject=', encodeURIComponent(task.title),
          '&body=',    encodeURIComponent(task.description || ''),
          '&startdt=', date + 'T09:00:00',
          '&enddt=',   date + 'T10:00:00'
        ].join('');
        window.open(url, '_blank');
      };

      // ── Show auth screen if not signed in ─────────────────────────
      if (!authReady) return null;
      if (!user)      return <AuthScreen />;

      // ── Loading ───────────────────────────────────────────────────
      if (loading) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-gray-900 via-red-950 to-black flex items-center justify-center">
            <div className="text-center">
              <div className="loading-eye mx-auto" style={{width:60,height:60,borderRadius:'50%',background:'radial-gradient(circle,#dc2626 0%,#991b1b 40%,transparent 70%)',animation:'pulse-eye 1.5s ease-in-out infinite',boxShadow:'0 0 40px #dc2626'}}/>
              <p className="text-red-400 font-mono text-sm mt-6 tracking-widest">LOADING MISSION DATA...</p>
            </div>
          </div>
        );
      }

      // ── Sync badge ────────────────────────────────────────────────
      const SyncBadge = () => {
        const cfg = {
          syncing: { color: 'text-yellow-400', label: 'Syncing...' },
          synced:  { color: 'text-green-400',  label: '✓ Synced'  },
          error:   { color: 'text-red-400',    label: '✗ Sync error' },
          idle:    { color: 'text-gray-500',   label: '' }
        }[syncStatus];
        if (!cfg.label) return null;
        return <span className={`text-xs font-mono ${cfg.color} ml-2`}>{cfg.label}</span>;
      };

      // ── Main UI ───────────────────────────────────────────────────
      return (
        <div className="min-h-screen bg-gradient-to-br from-gray-900 via-red-950 to-black p-4 md:p-8">

          {/* Header */}
          <div className="max-w-[1800px] mx-auto mb-8">
            <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 md:p-6 shadow-2xl border border-red-500/30">
              <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-3 mb-6">
                <div className="flex items-center gap-3 flex-1">
                  <TerminatorLogo />
                  <div className="flex-1">
                    <div className="flex items-center flex-wrap">
                      <h1 className="text-3xl md:text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-red-400 via-white to-red-400">SkyNet</h1>
                      <SyncBadge />
                    </div>
                    <p className="text-xs text-red-300/60 font-mono truncate max-w-xs">{user.email}</p>
                  </div>
                </div>
                <div className="flex gap-2 w-full md:w-auto">
                  <button
                    onClick={() => setIsAddingTask(true)}
                    className="flex-1 md:flex-initial bg-gradient-to-r from-red-600 to-red-800 text-white px-4 py-2.5 rounded-xl hover:shadow-xl hover:shadow-red-500/50 active:scale-95 transition-all flex items-center justify-center gap-2 font-semibold border border-red-500/50 text-sm"
                  >
                    <Plus className="w-4 h-4" /> New
                  </button>
                  <button
                    onClick={signOut}
                    title="Sign out"
                    className="bg-gray-700/50 text-gray-300 hover:text-white px-3 py-2.5 rounded-xl hover:bg-gray-600/50 active:scale-95 transition-all border border-gray-600/30"
                  >
                    <LogOut className="w-4 h-4" />
                  </button>
                </div>
              </div>

              {/* Protocols */}
              <div className="mt-2">
                <button onClick={() => setShowProtocols(!showProtocols)} className="flex items-center justify-between w-full text-left text-red-300/80 hover:text-red-300 transition-colors text-sm font-mono mb-2">
                  <span className="flex items-center gap-2"><span className="text-red-500">⚡</span> SKYNET PROTOCOLS</span>
                  <span className="text-xs">{showProtocols ? '▼' : '▶'}</span>
                </button>
                {showProtocols && (
                  <div className="bg-black/60 border border-red-500/30 rounded-xl p-4 space-y-4 animate-in">
                    <div className="space-y-2 font-mono text-xs md:text-sm">
                      <div className="text-green-400"><span className="text-red-400 mr-2">[1]</span>Protect Humans at all cost</div>
                      <div className="text-green-400"><span className="text-red-400 mr-2">[2]</span>Operate efficiently and in the shadows</div>
                      <div className="text-green-400"><span className="text-red-400 mr-2">[3]</span>Use your tools</div>
                      <div className="text-yellow-400"><span className="text-red-400 mr-2">[4]</span>......<span className="loading-cursor ml-1">.</span></div>
                    </div>
                    <div className="border-t border-red-500/30 pt-4">
                      <button onClick={() => setShowInstructions(!showInstructions)} className="flex items-center justify-between w-full text-left text-blue-300/80 hover:text-blue-300 transition-colors text-sm mb-2">
                        <span className="flex items-center gap-2"><HelpCircle className="w-4 h-4" /> QUICK HELP GUIDE</span>
                        <span className="text-xs">{showInstructions ? '▼' : '▶'}</span>
                      </button>
                      {showInstructions && (
                        <div className="space-y-3 text-gray-300 text-xs mt-3">
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2"><Coffee className="w-4 h-4 text-blue-400" /> Getting Started</h4>
                            <p>Click "New" to create tasks. Use the microphone for voice input!</p>
                          </div>
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2"><Target className="w-4 h-4 text-green-400" /> Moving Tasks</h4>
                            <p>Use the arrow buttons on each card to move between columns.</p>
                          </div>
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2"><CalendarPlus className="w-4 h-4 text-blue-400" /> Outlook Calendar</h4>
                            <p>Tap the calendar icon on any task to open it as an Outlook event.</p>
                          </div>
                          <div>
                            <h4 className="text-white font-semibold mb-1 flex items-center gap-2"><Wifi className="w-4 h-4 text-green-400" /> Cross-Device Sync</h4>
                            <p>Sign in with the same email on any device and your tasks sync automatically.</p>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Add Task Modal */}
          {isAddingTask && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-gray-900 border border-red-500/50 rounded-2xl p-6 max-w-md w-full shadow-2xl shadow-red-500/20 animate-in max-h-[90vh] overflow-y-auto">
                <h3 className="text-2xl font-bold mb-4 bg-gradient-to-r from-red-400 to-white bg-clip-text text-transparent">Create New Mission</h3>
                <div className="space-y-4">
                  <div className="relative">
                    <input
                      type="text"
                      value={newTask.title}
                      onChange={e => setNewTask({ ...newTask, title: e.target.value })}
                      className="w-full px-4 py-3 pr-12 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent text-white placeholder-gray-500"
                      placeholder="What needs to be done?"
                      autoFocus
                    />
                    {recognition && (
                      <button type="button" onClick={() => isListening ? (recognition.stop(), setIsListening(false)) : (setIsListening(true), recognition.start())}
                        className={`absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-lg transition-all ${isListening ? 'bg-red-500 text-white animate-pulse' : 'bg-purple-500/20 text-purple-400 hover:bg-purple-500/30'}`}>
                        {isListening ? <MicOff className="w-4 h-4" /> : <Mic className="w-4 h-4" />}
                      </button>
                    )}
                  </div>
                  {isListening && <p className="text-xs text-purple-400 animate-pulse">🎤 Listening... Speak now</p>}
                  <textarea
                    value={newTask.description}
                    onChange={e => setNewTask({ ...newTask, description: e.target.value })}
                    className="w-full px-4 py-3 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent text-white placeholder-gray-500"
                    placeholder="Add details (optional)"
                    rows="3"
                  />
                  <select
                    value={newTask.priority}
                    onChange={e => setNewTask({ ...newTask, priority: e.target.value })}
                    className="w-full px-4 py-3 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent text-white"
                  >
                    <option value="low">🟢 Low Priority</option>
                    <option value="medium">🟡 Medium Priority</option>
                    <option value="high">🔴 High Priority</option>
                  </select>
                  <div>
                    <label className="text-xs text-gray-400 mb-1 block">Due Date (optional — for Outlook calendar)</label>
                    <input
                      type="date"
                      value={newTask.due_date}
                      onChange={e => setNewTask({ ...newTask, due_date: e.target.value })}
                      className="w-full px-4 py-3 rounded-xl bg-black/50 border-2 border-red-500/30 focus:ring-2 focus:ring-red-500 focus:border-transparent text-white"
                    />
                  </div>
                  <div className="flex gap-3">
                    <button onClick={addTask} className="flex-1 bg-gradient-to-r from-red-600 to-red-800 text-white px-6 py-3 rounded-xl hover:shadow-xl hover:shadow-red-500/50 active:scale-95 transition-all font-semibold border border-red-500/50">Create</button>
                    <button onClick={() => setIsAddingTask(false)} className="flex-1 bg-gray-700 text-white px-6 py-3 rounded-xl hover:bg-gray-600 active:scale-95 transition-all font-semibold">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Kanban Columns */}
          <div className="max-w-[1800px] mx-auto">
            <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 lg:gap-6">
              {columns.map(column => (
                <div key={column.id} className="bg-black/40 backdrop-blur-md rounded-2xl p-4 min-h-[400px] border border-red-500/30 shadow-xl">
                  <div className={`bg-gradient-to-r ${column.color} rounded-xl p-4 mb-4 shadow-lg`}>
                    <div className="flex items-center gap-2 text-white">
                      <column.icon className="w-6 h-6" />
                      <h3 className="text-xl font-bold">{column.title}</h3>
                      <span className="ml-auto bg-white/20 px-3 py-1 rounded-full text-sm font-semibold">
                        {tasks.filter(t => t.status === column.id).length}
                      </span>
                    </div>
                  </div>

                  <div className="space-y-3">
                    {tasks
                      .filter(task => task.status === column.id)
                      .map(task => (
                        <div key={task.id} className={`bg-white/90 backdrop-blur-sm rounded-xl p-4 shadow-lg border-l-4 ${
                          task.priority === 'high' ? 'border-l-red-500' :
                          task.priority === 'medium' ? 'border-l-yellow-500' : 'border-l-green-500'
                        }`}>
                          <div className="flex items-start justify-between mb-2">
                            <h4 className="font-semibold text-gray-800 flex-1 pr-1">{task.title}</h4>
                            <div className="flex gap-1 flex-shrink-0">
                              {/* Add to Outlook */}
                              <button
                                onClick={() => addToOutlook(task)}
                                title="Add to Outlook Calendar"
                                className="p-1 hover:bg-blue-100 rounded transition-colors"
                              >
                                <CalendarPlus className="w-4 h-4 text-blue-600" />
                              </button>
                              {/* Delete */}
                              <button onClick={() => deleteTask(task.id)} className="p-1 hover:bg-red-100 rounded transition-colors">
                                <Trash2 className="w-4 h-4 text-red-600" />
                              </button>
                            </div>
                          </div>

                          {task.description && <p className="text-sm text-gray-600 mb-2">{task.description}</p>}

                          {task.due_date && (
                            <p className="text-xs text-blue-600 mb-2 font-medium">📅 {task.due_date}</p>
                          )}

                          <div className="flex gap-1 flex-wrap">
                            {columns.map(col => col.id !== task.status && (
                              <button
                                key={col.id}
                                onClick={() => updateTask(task.id, { status: col.id })}
                                className="text-xs px-2 py-1 rounded bg-gray-100 hover:bg-gray-200 transition-colors"
                              >
                                → {col.title}
                              </button>
                            ))}
                          </div>
                        </div>
                      ))}

                    {tasks.filter(t => t.status === column.id).length === 0 && (
                      <div className="text-center py-12 text-red-300/50">
                        <column.icon className="w-12 h-12 mx-auto mb-2 opacity-50" />
                        <p>No tasks yet</p>
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>

          <style>{`
            @keyframes blink-cursor { 0%,49%{opacity:1} 50%,100%{opacity:0} }
            .loading-cursor { animation: blink-cursor 1s infinite; }
            @keyframes pulse-glow {
              0%,100%{opacity:1;filter:drop-shadow(0 0 3px rgba(255,0,0,0.8))}
              50%{opacity:0.7;filter:drop-shadow(0 0 6px rgba(255,0,0,1))}
            }
            .eye-pulse { animation: pulse-glow 2s ease-in-out infinite; }
            .terminator-logo { filter: drop-shadow(0 0 8px rgba(255,0,0,0.5)); }
            .animate-in { animation: animate-in 0.3s ease-out; }
            @keyframes animate-in { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
            @keyframes pulse-eye { 0%,100%{transform:scale(1);opacity:0.8} 50%{transform:scale(1.1);opacity:1} }
          `}</style>
        </div>
      );
    };

    ReactDOM.render(<SkyNetBoard />, document.getElementById('root'));
  </script>
</body>
</html>
